name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]  # macos-latest is ARM64 (Apple Silicon)
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (engine + reconstruction deps + dev tools — all permissive wheels)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[slice,dev]"
      - name: License gate (permissive-only, incl. slice extras)
        run: python scripts/check_licenses.py --extras slice
      - name: Lint
        run: ruff check .
      - name: Tests (fast — slow/integration tests need sample imagery)
        run: pytest -q -m "not slow"
      - name: Smoke — run the dummy pipeline end to end
        run: |
          openreco run samples/dummy
          openreco run samples/dummy   # second run must be an all-cached no-op
