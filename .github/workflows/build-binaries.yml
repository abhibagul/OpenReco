name: build-binaries

# Build a single self-contained `openreco` executable for Windows, macOS and Linux. PyInstaller is
# not a cross-compiler, so each OS is built on its own runner. Push a version tag (v1.2.3) to build
# all three and publish a GitHub Release with the archives attached; or run manually for test builds.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # the release job needs to create a Release on tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            binary: dist/openreco.exe
          - os: macos-latest
            name: macos-arm64
            binary: dist/openreco
          - os: ubuntu-latest
            name: linux-x64
            binary: dist/openreco
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenReco + reconstruction deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[slice]"
          pip install pyinstaller

      - name: Build single-file executable
        run: pyinstaller packaging/openreco.spec

      - name: Smoke-test the binary
        run: |
          "${{ matrix.binary }}" --version
          "${{ matrix.binary }}" doctor
        shell: bash

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/openreco.exe -DestinationPath openreco-${{ matrix.name }}.zip
        shell: pwsh

      - name: Archive (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/openreco
          tar -C dist -czf "openreco-${{ matrix.name }}.tar.gz" openreco

      - uses: actions/upload-artifact@v4
        with:
          name: openreco-${{ matrix.name }}
          path: openreco-${{ matrix.name }}.*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/openreco-*
          generate_release_notes: true
