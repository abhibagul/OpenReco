[project]
name = "Aerial demo"
crs = "EPSG:32613"
chunks = ["abhishek"]

[[stage]]
id = "ingest1"
type = "ingest"
chunk = "abhishek"
params = { image_dir = "C:\\Users\\abbyb\\Downloads\\example_building\\images" }

[[stage]]
id = "sfm1"
type = "sfm"
chunk = "abhishek"
inputs = ["ingest1"]
params = { max_image_size = 3200, matcher = "exhaustive", max_num_features = 12000, camera_mode = "auto", mapper = "incremental" }

[[stage]]
id = "mvs1"
type = "mvs"
chunk = "abhishek"
inputs = ["ingest1", "sfm1"]
params = { quality = "high", geometric_consistency = true, dense_backend = "auto", planesweep_max_dim = 900 }

[[stage]]
id = "classify1"
type = "classify"
chunk = "abhishek"
inputs = ["mvs1"]
params = { cell_m = 5, ground_threshold_m = 0.5 }

[[stage]]
id = "contours1"
type = "contours"
chunk = "abhishek"
inputs = ["sfm1"]
params = { interval_m = 10 }
