[project]
name = "Aerial demo"
crs = "EPSG:32613"
chunks = ["abhishek"]

[[stage]]
id = "ingest1"
type = "ingest"
chunk = "abhishek"
params = { image_dir = "C:\\Users\\abbyb\\Downloads\\example_building\\images", blur_relative = 0.15 }

[[stage]]
id = "sfm1"
type = "sfm"
chunk = "abhishek"
inputs = ["ingest1"]
params = { max_image_size = 1200, matcher = "sequential", max_num_features = 4096, camera_mode = "auto", mapper = "incremental" }

[[stage]]
id = "mvs1"
type = "mvs"
chunk = "abhishek"
inputs = ["ingest1", "sfm1"]
params = { quality = "low", geometric_consistency = false, dense_backend = "auto", planesweep_max_dim = 600 }

[[stage]]
id = "classify1"
type = "classify"
chunk = "abhishek"
inputs = ["mvs1"]
params = { cell_m = 5, ground_threshold_m = 0.5 }

[[stage]]
id = "contours1"
type = "contours"
chunk = "abhishek"
inputs = ["sfm1"]
params = { interval_m = 10 }

[[stage]]
id = "dsm1"
type = "dsm"
chunk = "abhishek"
inputs = ["mvs1"]
params = { resolution_m = 0.2 }
