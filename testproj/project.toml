[project]
name = "Aerial demo"
crs = "EPSG:32613"

[[stage]]
id = "ingest1"
type = "ingest"
params = { image_dir = "C:\\Users\\abbyb\\Downloads\\example_building\\images", blur_relative = 0.15 }

[[stage]]
id = "sfm1"
type = "sfm"
inputs = ["ingest1"]
params = { max_image_size = 700, max_num_features = 3000, matcher = "spatial", camera_mode = "auto", mapper = "incremental" }

[[stage]]
id = "mvs1"
type = "mvs"
inputs = ["ingest1", "sfm1"]
params = { quality = "low", geometric_consistency = true, planesweep_max_dim = 600, dense_backend = "auto" }
