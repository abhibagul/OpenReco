<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenReco</title>
<style>
  :root { --bg:#0b0e14; --panel:#11161f; --line:#1f2733; --fg:#cdd6f4; --muted:#7f8da3;
          --accent:#89b4fa; --ok:#a6e3a1; --warn:#f9e2af; --err:#f38ba8; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
              font:13px/1.5 system-ui,sans-serif; overflow:hidden; }
  #app { display:grid; grid-template-columns:280px 1fr 340px; grid-template-rows:38px 1fr;
         grid-template-areas:"top top top" "left center right"; height:100vh; }
  #top { grid-area:top; display:flex; align-items:center; gap:12px; padding:0 12px;
         background:var(--panel); border-bottom:1px solid var(--line); }
  #top b { color:var(--accent); } #top .sp { flex:1; }
  button { background:#313a4e; color:var(--fg); border:0; padding:5px 10px; border-radius:5px;
           cursor:pointer; font-size:12px; } button:hover{ background:#3b4660; }
  button.run { background:var(--accent); color:#0b0e14; font-weight:600; }
  #left,#right { background:var(--panel); overflow:auto; padding:10px; }
  #left { grid-area:left; border-right:1px solid var(--line); }
  #right { grid-area:right; border-left:1px solid var(--line); }
  #center { grid-area:center; position:relative; } #c { width:100%; height:100%; display:block; }
  h3 { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
       margin:14px 0 6px; }
  .layer { padding:6px 8px; border-radius:5px; cursor:pointer; display:flex; align-items:center;
           gap:6px; border:1px solid transparent; }
  .layer:hover { background:#1a2230; } .layer.sel { background:#1d2738; border-color:var(--accent); }
  .layer .t { color:var(--muted); font-size:11px; } .layer .id { flex:1; }
  .dot { width:8px; height:8px; border-radius:50%; background:#444c5c; flex:0 0 auto; }
  .dot.executed,.dot.cached { background:var(--ok); } .dot.failed { background:var(--err); }
  .dot.running { background:var(--warn); }
  .chunk { padding:5px 6px; font-weight:600; cursor:pointer; border-radius:4px; display:flex; gap:6px; }
  .chunk:hover { background:#1a2230; } .chunk.active { color:var(--accent); }
  .chunk .cnt { color:var(--muted); font-weight:400; }
  #workspace .layer { margin-left:12px; }
  label { display:block; margin:8px 0 2px; color:var(--muted); font-size:11px; }
  input,select { width:100%; background:#0d121b; color:var(--fg); border:1px solid var(--line);
                 border-radius:4px; padding:5px; font-size:12px; }
  input[type=checkbox]{ width:auto; }
  #log { font-family:ui-monospace,monospace; font-size:11px; white-space:pre-wrap; color:var(--muted);
         margin-top:8px; max-height:30vh; overflow:auto; border-top:1px solid var(--line); padding-top:6px; }
  .row { display:flex; gap:6px; align-items:center; } .sp { flex:1; }
  .muted { color:var(--muted); }
  .menu { position:relative; }
  .dropdown { position:absolute; top:32px; left:0; background:var(--panel); border:1px solid var(--line);
              border-radius:6px; z-index:30; min-width:210px; padding:4px; box-shadow:0 8px 24px #0007; }
  .dropdown div { padding:7px 10px; cursor:pointer; border-radius:4px; }
  .dropdown div:hover { background:#1a2230; } .dropdown .t { color:var(--muted); font-size:11px; }
  .hidden { display:none; }
  .modal { position:fixed; inset:0; background:#0009; display:flex; align-items:center;
           justify-content:center; z-index:50; }
  .dialog { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px;
            width:400px; max-height:82vh; overflow:auto; }
  .dialog h2 { font-size:15px; margin:0 0 4px; } .chk { display:flex; gap:6px; align-items:center; margin:3px 0; }
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <b>OpenReco</b> <span id="pname" class="muted"></span>
    <div class="menu"><button id="wfBtn">＋ Workflow ▾</button>
      <div id="wfDrop" class="dropdown hidden"></div></div>
    <span class="sp"></span>
    <span id="status" class="muted"></span>
    <button class="run" id="runBtn">▶ Run pipeline</button>
  </div>
  <div id="left">
    <h3>Workspace</h3>
    <div class="row" style="margin-bottom:6px">
      <span id="activeChunk" class="muted"></span><span class="sp"></span>
      <button id="newChunk">+ Chunk</button></div>
    <div id="workspace"></div>
    <h3>Add layer (advanced)</h3>
    <div class="row"><select id="newType"></select></div>
    <div class="row" style="margin-top:6px"><input id="newId" placeholder="layer id" />
      <button id="addBtn">Add</button></div>
  </div>
  <div id="center"><canvas id="c"></canvas></div>
  <div id="right">
    <h3>Parameters</h3>
    <div id="params"><div class="muted">Select a layer.</div></div>
    <h3>Run log</h3>
    <div id="log"></div>
  </div>
</div>
<div id="modal" class="modal hidden"><div class="dialog">
  <h2 id="mTitle"></h2><div id="mDesc" class="muted"></div>
  <label>Layer id</label><input id="mId" />
  <h3>Inputs</h3><div id="mInputs"></div>
  <h3>Options</h3><div id="mFields"></div>
  <div class="row" style="margin-top:14px"><button id="mCancel">Cancel</button><span class="sp"></span>
    <button class="run" id="mOk">Build</button></div>
</div></div>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
